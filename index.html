<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashish Gaude | 3D Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4P8KQGJ128"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4P8KQGJ128');
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body class="is-3d-mode">

    <div id="canvas-container"></div>

    <!-- HUD Overlay -->
    <div id="hud">
        <div id="hud-content">
            <button id="close-hud"><i class="fas fa-times"></i></button>
            <div id="hud-body"></div>
        </div>
    </div>

    <!-- Instructions Overlay -->
    <div id="instructions">
        <p>DRAG TO ROTATE | CLICK NODES TO EXPLORE</p>
    </div>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p>BOOTING SYSTEM...</p>
    </div>

    <!-- Quick Navigation HUD -->
    <nav id="quick-nav">
        <div class="nav-item" data-section="profile" title="The Core">
            <i class="fas fa-microchip"></i>
            <span class="nav-label">CORE</span>
        </div>
        <div class="nav-item" data-section="experience" title="History">
            <i class="fas fa-history"></i>
            <span class="nav-label">HISTORY</span>
        </div>
        <div class="nav-item" data-section="skills" title="Abilities">
            <i class="fas fa-code"></i>
            <span class="nav-label">ABILITIES</span>
        </div>
        <div class="nav-item" data-section="projects" title="Source Code">
            <i class="fas fa-project-diagram"></i>
            <span class="nav-label">SOURCE</span>
        </div>
        <div class="nav-item" data-section="education" title="Intel">
            <i class="fas fa-graduation-cap"></i>
            <span class="nav-label">INTEL</span>
        </div>
    </nav>

    <!-- Mini-Map Radar -->
    <div id="radar">
        <div id="radar-sweep"></div>
        <div id="radar-nodes"></div>
    </div>

    <script src="assets/js/portfolio3d.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
